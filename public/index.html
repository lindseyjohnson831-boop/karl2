  .kc-livedot { width: 7px; height: 7px; border-radius: 999px; background: #e0445b; display: inline-block;

  <script>
    /* Native bridge — only active inside the iOS/Android app (react-native-webview).
       External links must NOT navigate the WebView itself: that strands the user on
       an external site with no way back into the app. Instead we intercept clicks on
       http(s)/mailto/sms/tel links and hand the URL to the native side, which opens
       it in Safari / Mail / Messages. (See onMessage in App.js.) */
    (function () {
      if (!window.ReactNativeWebView) return;
      document.addEventListener('click', function (e) {
        var el = e.target;
        while (el && el !== document.documentElement) {
          if (el.tagName === 'A' && el.href) break;
          el = el.parentElement;
        }
        if (!el || el.tagName !== 'A') return;
        var href = el.href || '';
        if (/^(https?|mailto|sms|tel):/i.test(href)) {
          e.preventDefault();
          window.ReactNativeWebView.postMessage(JSON.stringify({ type: 'open-url', url: href }));
        }
      }, true);
    })();
  </script>

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

  </script>

/* KarlCheck — hand-drawn weather badges + Karl mascot.
   Line-art SVGs, stroke = currentColor, wobbled by a shared turbulence filter.
   Mount <KarlDefs/> once near the app root, then use <WeatherIcon status=.. />. */

// Shared roughen filter — gives strokes a hand-drawn wobble.
// `on` toggles the displacement (0 = flat, clean lines).
function KarlDefs({ on = true }) {
  const s1 = on ? 2.1 : 0, s2 = on ? 2.6 : 0;
  return (
    <svg width="0" height="0" style={{ position: "absolute" }} aria-hidden="true">
      <defs>
        <filter id="karlRough" x="-12%" y="-12%" width="124%" height="124%">
          <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="n" />
          <feDisplacementMap in="SourceGraphic" in2="n" scale={s1} xChannelSelector="R" yChannelSelector="G" />
        </filter>
        <filter id="karlRough2" x="-12%" y="-12%" width="124%" height="124%">
          <feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="21" result="n" />
          <feDisplacementMap in="SourceGraphic" in2="n" scale={s2} xChannelSelector="R" yChannelSelector="G" />
        </filter>
      </defs>
    </svg>
  );
}

function WeatherIcon({ status = "sun", size = 32, sw = 2.3, rough = true, style = {} }) {
  const f = rough ? "url(#karlRough)" : undefined;

  const inner = () => {
    switch (status) {
      case "sun":
        return (
          <g {...common}>
            <circle cx="24" cy="24" r="7.5" />
            {Array.from({ length: 8 }).map((_, i) => {
              const a = (i * Math.PI) / 4;
              const r1 = 12.5, r2 = 17.5;
              return <line key={i}
                x1={24 + Math.cos(a) * r1} y1={24 + Math.sin(a) * r1}
                x2={24 + Math.cos(a) * r2} y2={24 + Math.sin(a) * r2} />;
            })}
          </g>
        );
      case "partly":
        return (
          <g {...common}>
            <circle cx="18" cy="18" r="5.5" />

                x1={18 + Math.cos(a) * 8} y1={18 + Math.sin(a) * 8}
                x2={18 + Math.cos(a) * 11.5} y2={18 + Math.sin(a) * 11.5} />;
            })}
            <path d="M16 36 q-6 0 -6 -6 q0 -5 5.4 -5.6 q1.2 -7 8.6 -7 q6.4 0 7.6 6.2 q5.8 .2 5.8 6.2 q0 6.2 -7 6.2 z" />
          </g>
        );
      case "mist":
        return (
          <g {...common}>
            {[15, 22, 29, 36].map((y, i) => (

        return (
          <g {...common}>
            <path d={cloud} />

          </g>
        );
      case "rain":
        return (
          <g {...common}>
            <path d={cloud} />

              <line key={i} x1={x} y1="36" x2={x - 2.5} y2="42.5" strokeWidth={sw * 0.95} />
            ))}
          </g>
        );
      case "night":
        return (
          <g {...common}>
            <path d="M31 30 a12 12 0 1 1 -11 -19 a9.5 9.5 0 0 0 11 19 z" />

          </g>
        );
      default:
        return null;
    }
  };

  return (
    <svg width={size} height={size} viewBox="0 0 48 48" style={{ filter: f, overflow: "visible", display: "block", ...style }}>
      {inner()}
    </svg>
  );
}

/* KarlCheck — main app */
const { useState, useRef, useEffect, useCallback, useMemo } = React;

  classic: ["#eae8e4", "#f6f3ee", "#34293a", "#863a5c", "#c25c6e"],
  foggy:   ["#e6e7ea", "#f2f3f5", "#28304a", "#45598c", "#7d93c0"],
  sunset:  ["#efe6da", "#f8f1e7", "#4a3326", "#c06a3b", "#d99463"],

// hoods with nativeEmbed:false fall back to poster + "Watch live ↗" in the app.

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

// point-in-polygon (ray cast) over the traced neighborhood regions
function pointInPoly(x, y, poly) {
  let inside = false;
  for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
    const xi = poly[i][0], yi = poly[i][1], xj = poly[j][0], yj = poly[j][1];
    if (((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi)) inside = !inside;
  }
  return inside;
}
function hoodAt(mx, my) {
  const R = window.KARL_REGION_PTS || {};
  for (const h of window.KARL_HOODS) {
    const p = R[h.id];
    if (p && pointInPoly(mx, my, p)) return h.id;
  }
  return null;
}

// ── citywide verdict ───────────────────────────────────────────
function cityVerdict(hoods) {
  const foggy = hoods.filter(h => h.score >= 70).length;
  const clear = hoods.filter(h => h.score <= 22).length;
  const avg = Math.round(hoods.reduce((s,h)=>s+h.score,0) / hoods.length);
  let head, status;
  if (avg >= 62) { head = "Heavy Karl citywide"; status = "karl"; }
  else if (avg >= 42) { head = "Patchy Karl"; status = "partly"; }
  else if (avg >= 26) { head = "Mostly clear"; status = "partly"; }
  else { head = "Karl's taken the day off"; status = "sun"; }
  return { head, status, foggy, clear, avg };
}

  try { return JSON.parse(localStorage.getItem("kc-account") || "null"); } catch (e) { return null; }
}
function loadContributions() {
  try { return JSON.parse(localStorage.getItem("kc-contributions") || "[]"); } catch (e) { return []; }

const KC_PHOTO_TTL_MS = 24 * 60 * 60 * 1000;
function pruneContribs(list) {

const KC_ROLES = ["Dog Walker", "Surfer", "Commuter", "Barista", "Stoop Sitter", "Fog Chaser",

  "Hill Climber", "Local", "Burrito Enthusiast", "Tram Rider", "Early Riser", "Cable Car Commuter"];

      const canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, w, h);

      const now = new Date();
      const ds = now.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
      const ts = now.toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" });
      const fs = Math.max(14, Math.round(w * 0.030));
      const pad = Math.round(fs * 0.8);
      const barH = fs * 2.2 + pad;
      const g = ctx.createLinearGradient(0, h - barH, 0, h);
      g.addColorStop(0, "rgba(0,0,0,0)"); g.addColorStop(1, "rgba(0,0,0,0.78)");
      ctx.fillStyle = g; ctx.fillRect(0, h - barH, w, barH);
      ctx.textBaseline = "bottom";
      ctx.fillStyle = "#fff";
      ctx.font = `700 ${Math.round(fs * 1.15)}px ui-monospace, "DM Mono", monospace`;
      ctx.fillText(hoodName, pad, h - pad - fs * 1.15);
      ctx.fillStyle = "rgba(255,255,255,0.88)";
      ctx.font = `500 ${fs}px ui-monospace, "DM Mono", monospace`;
      ctx.fillText(`${ds} · ${ts}`, pad, h - pad);
      if (author) {
        const tag = `@${author}`;
        ctx.textAlign = "right";
        ctx.fillStyle = "rgba(255,255,255,0.95)";
        ctx.font = `700 ${fs}px ui-monospace, "DM Mono", monospace`;
        ctx.fillText(tag, w - pad, h - pad);
        ctx.textAlign = "left";
      }

      cb(canvas.toDataURL("image/jpeg", 0.8), now.toISOString());
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// OFFLINE community state: shows the neighbor-submitted photo stack, or a prompt to add one.
// Older photos sit behind the newest as a deck — tapping the photo cycles through them.
// `fs` = fullscreen (roomy); otherwise sized to fit the 236px sheet tile.
function OfflineCam({ hood, stack, onRequestPhoto, big, fs }) {
  const ask = (e) => { e.stopPropagation(); onRequestPhoto && onRequestPhoto(hood); };

  useEffect(() => { setIdx(0); }, [hood.id, n]);

  if (cur) {

// Windy cams are still-image webcams, not video — its embed player waits for a
// tap to animate. We skip that chrome and show the live frame ourselves, quietly
// refreshing it so fog visibly updates (preload-then-swap to avoid flicker).
function windyCamId(url) {
  const m = /webcams\.windy\.com\/.*\/player\/(\d+)/.exec(url || "");
  return m && m[1];
}
// "live" = real video stream (iframe feed) · "snapshot" = a refreshing still
// image (Windy still-cams) · "offline" = no feed. Drives the badge wording so we
// never call a still photo "LIVE".
function camKind(hood) {
  if (!hood || !hood.liveUrl) return "offline";
  return windyCamId(hood.embedUrl || hood.liveUrl) ? "snapshot" : "live";
}
function WindyCam({ id, host, fit = "cover" }) {
  const url = (n) => `https://imgproxy.windy.com/_/full/plain/current/${id}/original.jpg?t=${n}`;
  const [src, setSrc] = useState(() => url(0));
  useEffect(() => {
    let alive = true, n = 0;
    setSrc(url(0));
    const tick = setInterval(() => {
      n += 1;
      const next = url(n), pre = new Image();
      pre.onload = () => { if (alive) setSrc(next); };
      pre.src = next;
    }, 25000);
    return () => { alive = false; clearInterval(tick); };
  }, [id]);
  return (
    <img src={src} alt={`Live cam — ${host}`} draggable="false"
      style={{ position: "absolute", inset: 0, width: "100%", height: "100%", objectFit: fit, background: "#000" }} />
  );
}

// absolute stamp for the photo pill, e.g. "Jun 8, 2:45 PM"
function photoStamp(iso) {
  return new Date(iso).toLocaleString(undefined, { month: "short", day: "numeric", hour: "numeric", minute: "2-digit" });
}

// relative time for community photos, e.g. "12m ago"
function timeAgo(iso) {
  const ms = Date.now() - new Date(iso).getTime();
  const m = Math.max(0, Math.round(ms / 60000));
  if (m < 1) return "just now";
  if (m < 60) return m + "m ago";
  const h = Math.round(m / 60);
  if (h < 24) return h + "h ago";
  return Math.round(h / 24) + "d ago";
}

function CameraModal({ open, hoodName, onClose, onCapture }) {

  useEffect(() => {
    if (!open) return;
    let cancelled = false;
    setErr("");
    (async () => {
      try {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) throw new Error("no api");
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
        if (cancelled) { stream.getTracks().forEach(t => t.stop()); return; }
        streamRef.current = stream;
        if (videoRef.current) { videoRef.current.srcObject = stream; videoRef.current.play().catch(() => {}); }
      } catch (e) { if (!cancelled) setErr("Camera unavailable here — check browser permissions, or upload a photo instead."); }

    return () => { cancelled = true; if (streamRef.current) { streamRef.current.getTracks().forEach(t => t.stop()); streamRef.current = null; } };

function App({ isDesktop = false }) {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const pal = (t.palette && t.palette.length === 5) ? t.palette : PALETTES.classic;
  const [paper, card, ink, accent, spot] = pal;

  const hoods = window.KARL_HOODS;
  const statusMeta = window.KARL_STATUS;
  const [sel, setSel] = useState(null);
  const [hoverId, setHoverId] = useState(null);
  const [fullCam, setFullCam] = useState(null);
  const [shareOpen, setShareOpen] = useState(false);
  const [settingsOpen, setSettingsOpen] = useState(false);
  const [account, setAccount] = useState(loadAccount);
  // photos expire after 24h — prune on load (write back only if something aged out,
  // so the kc-photos → kc-contributions migration below still sees a null key)
  const [contributions, setContributions] = useState(() => {
    const raw = loadContributions();
    const fresh = pruneContribs(raw);
    if (fresh.length !== raw.length) { try { localStorage.setItem("kc-contributions", JSON.stringify(fresh)); } catch (e) {} }
    return fresh;
  });
  const [captureHood, setCaptureHood] = useState(null);
  const [cameraOpen, setCameraOpen] = useState(false);
  const fileInputRef = useRef(null);
  // native app: getUserMedia is unreliable in a file:// WebView, so "Take a Photo"
  // uses a capture-enabled file input there — it opens the real system camera.
  const cameraInputRef = useRef(null);
  const takePhoto = () => {
    if (window.ReactNativeWebView || window.__KC_NATIVE__) {
      if (cameraInputRef.current) cameraInputRef.current.click();
    } else {
      setCameraOpen(true);
    }
  };

  const persistContribs = (next) => { try { localStorage.setItem("kc-contributions", JSON.stringify(next)); } catch (e) {} return next; };

  // one-time migration: seed the contributions log from any pre-existing photos
  useEffect(() => {
    if (localStorage.getItem("kc-contributions") !== null) return;
    const existing = loadPhotos();
    const ids = Object.keys(existing);
    if (!ids.length) return;
    const author = (loadAccount() && loadAccount().username) || "You";
    const seeded = [];
    ids.forEach((hid, i) => {
      const h = (window.KARL_HOODS || []).find(x => x.id === hid);
      const cid = `c_${Date.parse(existing[hid].ts) || Date.now()}_${i}`;
      seeded.push({ id: cid, hoodId: hid, hoodName: h ? h.name : hid, url: existing[hid].url,
        ts: existing[hid].ts, helpful: seedHelpful(cid), author });
    });
    setContributions(persistContribs(pruneContribs(seeded)));
    try { localStorage.removeItem("kc-photos"); } catch (e) {}
  }, []);

  // photos crossing the 24h line while the app stays open disappear live
  useEffect(() => {
    const tick = setInterval(() => {
      setContributions(prev => {
        const fresh = pruneContribs(prev);
        return fresh.length === prev.length ? prev : persistContribs(fresh);
      });
    }, 60000);
    return () => clearInterval(tick);
  }, []);

  const saveAccount = useCallback((acct) => {
    setAccount(prev => {
      const next = { ...(prev || {}), ...acct };
      try { localStorage.setItem("kc-account", JSON.stringify(next)); } catch (e) {}
      return next;
    });
  }, []);
  const logout = useCallback(() => {
    setAccount(null);
    try { localStorage.removeItem("kc-account"); } catch (e) {}
  }, []);

  const capturePhoto = useCallback((hood, file) => {
    const acct = loadAccount();
    const cid = `c_${Date.now()}`;
    const loggedIn = !!(acct && acct.username);
    const author = loggedIn ? acct.username : personaFor(hood.name, cid);
    stampPhoto(file, hood.name, loggedIn ? author : null, (url, ts) => {
      setContributions(prev => persistContribs([...prev, { id: cid, hoodId: hood.id, hoodName: hood.name, url, ts, helpful: 0, author, anon: !loggedIn }]));
    });
  }, []);

  const deleteContribution = useCallback((cid) => {
    setContributions(prev => persistContribs(prev.filter(c => c.id !== cid)));
  }, []);

  const myCount = account ? contributions.filter(c => c.author === account.username).length : 0;
  const acctView = account ? { ...account, level: myCount, contributions: myCount } : null;

  // capture flow: chooser → upload (file input) or webcam
  const requestPhoto = useCallback((hood) => setCaptureHood(hood), []);
  const onFilePicked = (e) => {
    const f = e.target.files && e.target.files[0];
    if (f && captureHood) capturePhoto(captureHood, f);
    e.target.value = "";
    setCaptureHood(null);
  };
  // newest-first photo stacks per neighborhood, derived from the contributions log
  const stacks = useMemo(() => {
    const m = {};
    for (const c of contributions) (m[c.hoodId] = m[c.hoodId] || []).push(c);
    for (const k in m) m[k].sort((a, b) => Date.parse(b.ts) - Date.parse(a.ts));
    return m;
  }, [contributions]);
  const stackForHood = (hid) => (hid && stacks[hid]) || [];


  const selHood = hoods.find(h => h.id === sel) || null;
  const verdict = cityVerdict(hoods);

  // ── pan / zoom ──
  const stageRef = useRef(null);
  const [stage, setStage] = useState({ w: 360, h: 470 });
  const [view, setView] = useState({ scale: 0.6, tx: 0, ty: 0 });
  const dragRef = useRef(null);
  const movedRef = useRef(false);
  const pointersRef = useRef(new Map());
  const pinchRef = useRef(null);

  const fitScale = stage.w / MAP_W;
  const minScale = fitScale, maxScale = fitScale * 8;

  const clampView = useCallback((v, s) => {
    const w = MAP_W * v.scale, h = MAP_H * v.scale;
    let tx, ty;
    if (w <= s.w) tx = (s.w - w) / 2; else tx = clamp(v.tx, s.w - w, 0);
    if (h <= s.h) ty = (s.h - h) / 2; else ty = clamp(v.ty, s.h - h, 0);
    return { scale: v.scale, tx, ty };
  }, []);

  useEffect(() => {
    const el = stageRef.current; if (!el) return;
    const measure = () => {
      const r = el.getBoundingClientRect();
      // use layout px (offsetWidth/Height) so the view math is independent of any
      // CSS scaling applied to an ancestor (e.g. a scaled phone frame)
      const s = { w: el.offsetWidth || r.width, h: el.offsetHeight || r.height };
      setStage(s);
      // frame the city: fill the stage height, center horizontally on mid-city
      const scale = clamp(s.h / MAP_H, s.w / MAP_W, (s.w / MAP_W) * 8);
      const cx = 0.49 * MAP_W * scale, cy = 0.50 * MAP_H * scale;
      setView(clampView({ scale, tx: s.w / 2 - cx, ty: s.h / 2 - cy }, s));
    };
    measure();
    const ro = new ResizeObserver(measure); ro.observe(el);
    return () => ro.disconnect();
  }, [clampView]);

  // client coords → stage-local layout px (robust to any ancestor CSS scaling)
  const clientToStage = (cx, cy) => {
    const el = stageRef.current;
    const r = el.getBoundingClientRect();
    const fx = (el.offsetWidth || r.width) / r.width, fy = (el.offsetHeight || r.height) / r.height;
    return [(cx - r.left) * fx, (cy - r.top) * fy];
  };
  // client coords → image coords (given a view)
  const clientToImg = (cx, cy, v) => {
    const [sxp, syp] = clientToStage(cx, cy);
    return [(sxp - v.tx) / v.scale, (syp - v.ty) / v.scale];
  };

  const onDown = (e) => {
    pointersRef.current.set(e.pointerId, { x: e.clientX, y: e.clientY });
    try { e.currentTarget.setPointerCapture?.(e.pointerId); } catch (err) {}
    if (pointersRef.current.size === 2) {
      // begin pinch: anchor the midpoint's image point
      const pts = [...pointersRef.current.values()];
      const midX = (pts[0].x + pts[1].x) / 2, midY = (pts[0].y + pts[1].y) / 2;
      const dist = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
      const anchor = clientToImg(midX, midY, view);
      pinchRef.current = { startDist: dist, startScale: view.scale, anchor };
      dragRef.current = null;
      movedRef.current = true;
    } else {
      dragRef.current = { x: e.clientX, y: e.clientY, tx: view.tx, ty: view.ty };
      movedRef.current = false;
    }
  };
  // map screen point → image coordinates (single pointer)
  const toMap = (e) => clientToImg(e.clientX, e.clientY, view);

  const onMove = (e) => {
    if (pointersRef.current.has(e.pointerId)) pointersRef.current.set(e.pointerId, { x: e.clientX, y: e.clientY });

    // pinch zoom (two fingers)
    if (pinchRef.current && pointersRef.current.size >= 2) {
      const pts = [...pointersRef.current.values()];
      const midX = (pts[0].x + pts[1].x) / 2, midY = (pts[0].y + pts[1].y) / 2;
      const dist = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
      const p = pinchRef.current;
      const ns = clamp(p.startScale * (dist / p.startDist), minScale, maxScale);
      const [msx, msy] = clientToStage(midX, midY);
      movedRef.current = true;
      setView(v => clampView({ scale: ns, tx: msx - p.anchor[0] * ns, ty: msy - p.anchor[1] * ns }, stage));
      return;
    }

    const d = dragRef.current;
    if (d) {
      const dx = e.clientX - d.x, dy = e.clientY - d.y;
      if (Math.abs(dx) + Math.abs(dy) > 6) movedRef.current = true;
      setView(v => clampView({ scale: v.scale, tx: d.tx + dx, ty: d.ty + dy }, stage));
      return;
    }
    if (!stageRef.current) return;          // hover highlight (mouse)
    const [mx, my] = toMap(e);
    const id = hoodAt(mx, my);
    if (id !== hoverId) setHoverId(id);
  };
  // tap (not drag/pinch) on a neighborhood selects it; tap on water deselects
  const onUp = (e) => {
    const wasPinch = !!pinchRef.current;
    pointersRef.current.delete(e.pointerId);
    if (pointersRef.current.size < 2) pinchRef.current = null;
    // if one finger remains after a pinch, hand off to a fresh drag (no jump)
    if (pointersRef.current.size === 1) {
      const [only] = [...pointersRef.current.values()];
      dragRef.current = { x: only.x, y: only.y, tx: view.tx, ty: view.ty };
      return;
    }
    const moved = movedRef.current;
    dragRef.current = null;
    if (moved || wasPinch || !stageRef.current) return;
    const [mx, my] = toMap(e);
    setSel(hoodAt(mx, my));
  };

  // desktop: wheel / trackpad zoom centered on cursor
  const onWheel = (e) => {
    if (!stageRef.current) return;
    e.preventDefault();
    const factor = Math.exp(-e.deltaY * 0.0015);
    setView(v => {
      const ns = clamp(v.scale * factor, minScale, maxScale);
      const [msx, msy] = clientToStage(e.clientX, e.clientY);
      const ix = (msx - v.tx) / v.scale, iy = (msy - v.ty) / v.scale;
      return clampView({ scale: ns, tx: msx - ix * ns, ty: msy - iy * ns }, stage);
    });
  };

  const zoom = (factor) => {
    setView(v => {
      const ns = clamp(v.scale * factor, minScale, maxScale);
      const cx = stage.w / 2, cy = stage.h / 2;
      const mx = (cx - v.tx) / v.scale, my = (cy - v.ty) / v.scale;
      return clampView({ scale: ns, tx: cx - mx * ns, ty: cy - my * ns }, stage);
    });
  };

  const sx = (h) => view.tx + (h.x / 100) * MAP_W * view.scale;
  const sy = (h) => view.ty + (h.y / 100) * MAP_H * view.scale;
  const onScreen = (x, y, m = 60) => x > -m && x < stage.w + m && y > -m && y < stage.h + m;

  // status badges are glued to a fixed image-space point above each hood, so they
  // track the map exactly while zooming; nudges de-overlap neighboring badges
  const BADGE_NUDGE = { soma: 20, fidi: 20, richmond: 20, sunset: -40 };
  const badgeY = (h) => view.ty + ((h.y / 100) * MAP_H - 84 + (BADGE_NUDGE[h.id] || 0)) * view.scale;

  const select = (id) => { if (!movedRef.current) setSel(id); };

  const rootStyle = {
    "--paper": paper, "--card": card, "--ink": ink, "--accent": accent, "--spot": spot,
    "--land": "#a9ccd6", "--land-line": "#eef2f0", "--coast": "#7ba6b1", "--fog": "#f4f2ee",
    "--hand": "'Patrick Hand', 'Comic Sans MS', cursive",
    "--display": "'Shantell Sans', 'Patrick Hand', cursive",
    "--mono": "'DM Mono', ui-monospace, monospace",
  };

  // ── desktop two-column layout ──────────────────────────────────────────
  if (isDesktop) return (
    <div style={{ ...rootStyle, height: "100%", display: "flex", flexDirection: "column",
      background: "var(--paper)", color: "var(--ink)" }}>
      <KarlDefs on={t.wobble} />

      {/* nav bar */}
      <div style={{ display: "flex", alignItems: "center", gap: 14, padding: "0 24px",
        height: 58, flexShrink: 0, background: "var(--card)",
        borderBottom: "1px solid color-mix(in srgb, var(--ink) 9%, transparent)", zIndex: 10 }}>
        <img src="project/assets/karlcheck-logo.png" alt="KarlCheck"
          style={{ height: 48, width: "auto", objectFit: "contain", objectPosition: "left center", mixBlendMode: "multiply" }} />
        <div style={{ flex: 1 }} />
        <div style={{ display: "flex", alignItems: "center", gap: 5,
          font: "600 10px var(--mono)", letterSpacing: 1,
          color: "var(--accent)", background: "color-mix(in srgb, var(--accent) 11%, transparent)", padding: "5px 9px", borderRadius: 999 }}>
          <span className="kc-livedot" />LIVE
        </div>
        <button onPointerDown={e => e.stopPropagation()} onClick={async () => {
          const url = window.__KC_SHARE_URL__ || 'https://karlcheck.app/get';
          const shareData = { title: "KarlCheck", text: "KarlCheck — fog, verified by your neighbors.", url };
          if (window.ReactNativeWebView) {
            // native app: use the real iOS/Android share sheet (handled in App.js)
            window.ReactNativeWebView.postMessage(JSON.stringify({ type: "share", ...shareData }));
            return;
          }
          if (navigator.share) { try { await navigator.share(shareData); return; } catch (err) { if (err?.name === "AbortError") return; } }
          setShareOpen(true);
        }} style={{ display: "flex", alignItems: "center", gap: 6,
          font: "600 11px var(--hand)", color: "var(--ink)", cursor: "pointer",
          background: "transparent", border: "1.5px solid color-mix(in srgb, var(--ink) 14%, transparent)",
          padding: "6px 12px", borderRadius: 999 }}>
          <ShareIcon size={14} /><span>Share</span>
        </button>
        <button onClick={() => setSettingsOpen(true)} aria-label="Settings" style={{
          width: 36, height: 36, borderRadius: 999, cursor: "pointer",
          background: "transparent", color: "var(--ink)",
          border: "1.5px solid color-mix(in srgb, var(--ink) 12%, transparent)",
          display: "flex", alignItems: "center", justifyContent: "center" }}>
          <CogIcon size={18} />
        </button>
      </div>

      {/* map + sidebar */}
      <div style={{ flex: 1, display: "flex", minHeight: 0 }}>

        {/* map column */}
        <div style={{ flex: 1, minWidth: 0, position: "relative", padding: 16 }}>
          <div ref={stageRef}
            onPointerDown={onDown} onPointerMove={onMove} onPointerUp={onUp} onPointerCancel={onUp}
            onWheel={onWheel} onPointerLeave={() => setHoverId(null)}
            style={{ position: "absolute", inset: 16, borderRadius: 18, overflow: "hidden",
              background: "#f4f1e9", boxShadow: "inset 0 0 0 1.5px rgba(0,0,0,0.07), 0 4px 14px rgba(0,0,0,0.07)",
              cursor: dragRef.current ? "grabbing" : (hoverId ? "pointer" : "grab"), touchAction: "none" }}>
            <div style={{ position: "absolute", left: 0, top: 0, width: MAP_W, height: MAP_H,
              transform: `translate(${view.tx}px,${view.ty}px) scale(${view.scale})`, transformOrigin: "0 0", pointerEvents: "none" }}>
              <SFMap />
            </div>
            <div style={{ position: "absolute", inset: 0, pointerEvents: "none" }}>
              {hoods.filter(h => h.liveUrl).map(h => onScreen(sx(h), badgeY(h)) && (
                <MapStatusBadge key={h.id} hood={h} photo={stackForHood(h.id)[0]} x={sx(h)} y={badgeY(h)} />
              ))}
              {selHood && onScreen(sx(selHood), sy(selHood)) && (
                <div style={{ position: "absolute", left: sx(selHood), top: sy(selHood) - 42,
                  transform: "translate(-50%,0)", background: "var(--ink)", color: "var(--paper)",
                  font: "700 13px var(--hand)", padding: "3px 11px", borderRadius: 999, whiteSpace: "nowrap",
                  pointerEvents: "none", zIndex: 35, boxShadow: "0 3px 9px rgba(0,0,0,0.2)" }}>{selHood.name}</div>
              )}
            </div>
            <div style={{ position: "absolute", right: 12, bottom: 12, display: "flex", flexDirection: "column", gap: 7, zIndex: 40 }}>
              {[["+", () => zoom(1.5)], ["–", () => zoom(1/1.5)]].map(([s, fn], i) => (
                <button key={i} onClick={fn} onPointerDown={e => e.stopPropagation()} onPointerUp={e => e.stopPropagation()} style={{
                  width: 40, height: 40, borderRadius: 12, border: "1.5px solid color-mix(in srgb, var(--ink) 14%, transparent)",
                  background: "var(--card)", color: "var(--ink)", font: "600 22px var(--hand)", cursor: "pointer",
                  boxShadow: "0 2px 7px rgba(0,0,0,0.12)", lineHeight: 1, paddingBottom: i ? 4 : 0 }}>{s}</button>
              ))}
            </div>
          </div>
        </div>

        {/* sidebar */}
        <div style={{ width: 360, flexShrink: 0, display: "flex", flexDirection: "column",
          borderLeft: "1px solid color-mix(in srgb, var(--ink) 9%, transparent)",
          background: "var(--card)", overflowY: "auto" }}>
          {selHood ? (
            <>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "flex-end",
                padding: "10px 14px", flexShrink: 0,
                borderBottom: "1px solid color-mix(in srgb, var(--ink) 8%, transparent)" }}>
                <button onClick={() => setSel(null)} style={{
                  width: 28, height: 28, borderRadius: 999, border: "none", cursor: "pointer",
                  background: "color-mix(in srgb, var(--ink) 8%, transparent)", color: "var(--ink)",
                  display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14 }}>✕</button>
              </div>
              <div style={{ padding: "16px 18px 32px" }}>
                <SheetBody hood={selHood} onExpand={setFullCam}
                  stack={stackForHood(selHood.id)} onRequestPhoto={requestPhoto} />
              </div>
            </>
          ) : <SidebarEmpty />}
        </div>
      </div>

      {/* overlays */}
      <FullscreenCam hood={fullCam} onMinimize={() => setFullCam(null)} onClose={() => { setFullCam(null); setSel(null); }}
        stack={fullCam ? stackForHood(fullCam.id) : []} onRequestPhoto={requestPhoto} />
      <input ref={fileInputRef} type="file" accept="image/*" onChange={onFilePicked} style={{ display: "none" }} />
      <input ref={cameraInputRef} type="file" accept="image/*" capture="environment" onChange={onFilePicked} style={{ display: "none" }} />
      <CaptureChooser open={!!captureHood && !cameraOpen} hoodName={captureHood && captureHood.name}
        onClose={() => setCaptureHood(null)} onTakePhoto={takePhoto}
        onUpload={() => fileInputRef.current && fileInputRef.current.click()} />
      <CameraModal open={cameraOpen} hoodName={captureHood && captureHood.name}
        onClose={() => setCameraOpen(false)}
        onCapture={(file) => { if (captureHood) capturePhoto(captureHood, file); setCameraOpen(false); setCaptureHood(null); }} />
      <TweaksPanel>
        <TweakSection label="Look" />
        <TweakColor label="Palette" value={t.palette}
          options={[PALETTES.classic, PALETTES.foggy, PALETTES.sunset]}
          onChange={v => setTweak("palette", v)} />
        <TweakToggle label="Hand-drawn wobble" value={t.wobble} onChange={v => setTweak("wobble", v)} />
      </TweaksPanel>
      <SettingsPanel open={settingsOpen} onClose={() => setSettingsOpen(false)}
        account={acctView} onSave={saveAccount} onLogout={logout}
        contributions={contributions} onDelete={deleteContribution} narrow />
      <SharePopover open={shareOpen} onClose={() => setShareOpen(false)} />
    </div>
  );

  // ── mobile layout ───────────────────────────────────────────────────────
  return (
    <div style={{ ...rootStyle, height: "100%", display: "flex", flexDirection: "column",
      background: "var(--paper)", color: "var(--ink)", position: "relative",
      }}>
      <KarlDefs on={t.wobble} />

      {/* ── header ── */}
      <div style={{ padding: "calc(env(safe-area-inset-top, 0px) + 14px) 16px 2px", flexShrink: 0, position: "relative" }}>
        <img src="project/assets/karlcheck-logo.png" alt="KarlCheck — fog verified by your neighbors"
          style={{ display: "block", width: "100%", height: "auto", maxHeight: 76, objectFit: "contain",
            objectPosition: "left center", mixBlendMode: "multiply" }} />
        <div style={{ position: "absolute", top: "calc(env(safe-area-inset-top, 0px) + 14px)", right: 14, display: "flex", alignItems: "center", gap: 8 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 5,
            font: "600 10px var(--mono)", letterSpacing: 1,
            color: "var(--accent)", background: "color-mix(in srgb, var(--accent) 11%, transparent)", padding: "5px 9px", borderRadius: 999 }}>
            <span className="kc-livedot" />LIVE
          </div>
          <button onClick={() => setSettingsOpen(true)} aria-label="Settings" style={{
            width: 38, height: 38, borderRadius: 999, cursor: "pointer", flexShrink: 0,
            background: "var(--card)", color: "var(--ink)",
            border: "1.5px solid color-mix(in srgb, var(--ink) 12%, transparent)",
            display: "flex", alignItems: "center", justifyContent: "center", boxShadow: "0 2px 7px rgba(0,0,0,0.1)" }}>
            <CogIcon size={20} />
          </button>
        </div>
      </div>

      {/* ── map card ── */}
      <div style={{ flex: 1, margin: "0 14px 14px", position: "relative", minHeight: 0 }}>
        <div ref={stageRef}
          onPointerDown={onDown} onPointerMove={onMove} onPointerUp={onUp} onPointerCancel={onUp}
          onWheel={onWheel}
          onPointerLeave={() => setHoverId(null)}
          style={{ position: "absolute", inset: 0, borderRadius: 22, overflow: "hidden",
            background: "#f4f1e9", boxShadow: "inset 0 0 0 1.5px rgba(0,0,0,0.07), 0 4px 14px rgba(0,0,0,0.07)",
            cursor: dragRef.current ? "grabbing" : (hoverId ? "pointer" : "grab"), touchAction: "none" }}>
          {/* transformed map (original vector illustration) */}
          <div style={{ position: "absolute", left: 0, top: 0, width: MAP_W, height: MAP_H,
            transform: `translate(${view.tx}px,${view.ty}px) scale(${view.scale})`, transformOrigin: "0 0", pointerEvents: "none" }}>
            <SFMap />
          </div>

          {/* overlay: selected name pill + status badges */}
          <div style={{ position: "absolute", inset: 0, pointerEvents: "none" }}>
            {/* status badges — neighborhoods with a live cam */}
            {hoods.filter(h => h.liveUrl).map(h => onScreen(sx(h), badgeY(h)) && (
              <MapStatusBadge key={h.id} hood={h} photo={stackForHood(h.id)[0]} x={sx(h)} y={badgeY(h)} />
            ))}
            {selHood && onScreen(sx(selHood), sy(selHood)) && (
              <div style={{ position: "absolute", left: sx(selHood), top: sy(selHood) - 42,
                transform: "translate(-50%,0)", background: "var(--ink)", color: "var(--paper)",
                font: "700 13px var(--hand)", padding: "3px 11px", borderRadius: 999, whiteSpace: "nowrap",
                pointerEvents: "none", zIndex: 35, boxShadow: "0 3px 9px rgba(0,0,0,0.2)" }}>{selHood.name}</div>
            )}
          </div>

          {/* zoom controls */}
          <div style={{ position: "absolute", right: 12, bottom: 12, display: "flex", flexDirection: "column", gap: 7, zIndex: 40 }}>
            {[["+", () => zoom(1.5)], ["–", () => zoom(1/1.5)]].map(([s, fn], i) => (
              <button key={i} onClick={fn} onPointerDown={e => e.stopPropagation()} onPointerUp={e => e.stopPropagation()} style={{
                width: 40, height: 40, borderRadius: 12, border: "1.5px solid color-mix(in srgb, var(--ink) 14%, transparent)",
                background: "var(--card)", color: "var(--ink)", font: "600 22px var(--hand)", cursor: "pointer",
                boxShadow: "0 2px 7px rgba(0,0,0,0.12)", lineHeight: 1, paddingBottom: i ? 4 : 0 }}>{s}</button>
            ))}
          </div>

          {/* share app */}
          <button onPointerDown={e => e.stopPropagation()} onPointerUp={e => e.stopPropagation()} onClick={async (e) => {
            e.stopPropagation();
            const url = window.__KC_SHARE_URL__ || 'https://karlcheck.app/get';
            const shareData = { title: "KarlCheck", text: "KarlCheck — fog, verified by your neighbors.", url };
            if (window.ReactNativeWebView) {
              // native app: use the real iOS/Android share sheet (handled in App.js)
              window.ReactNativeWebView.postMessage(JSON.stringify({ type: "share", ...shareData }));
              return;
            }
            const framed = (() => { try { return window.self !== window.top; } catch (e) { return true; } })();
            if (navigator.share && !framed) {
              try { await navigator.share(shareData); return; }
              catch (err) { if (err && err.name === "AbortError") return; }
            }
            setShareOpen(true);
          }} style={{
            position: "absolute", left: 12, bottom: 12, display: "flex", alignItems: "center", gap: 6,
            font: "600 11px var(--hand)", color: "var(--ink)", cursor: "pointer",
            background: "var(--card)", border: "1.5px solid color-mix(in srgb, var(--ink) 14%, transparent)",
            padding: "7px 12px", borderRadius: 999, boxShadow: "0 2px 7px rgba(0,0,0,0.12)" }}>
            <ShareIcon size={14} /><span data-lbl>Share</span>
          </button>

          <SharePopover open={shareOpen} onClose={() => setShareOpen(false)} />

          {/* hint */}
          <div style={{ position: "absolute", left: "50%", bottom: 14, transform: "translateX(-50%)",
            font: "11px var(--hand)", color: "var(--ink)",
            opacity: 0.5, background: "color-mix(in srgb, var(--card) 70%, transparent)", padding: "3px 9px", borderRadius: 999,
            whiteSpace: "nowrap", pointerEvents: "none" }}>tap a neighborhood</div>
        </div>
      </div>

      <BottomSheet hood={selHood} onClose={() => setSel(null)} onExpand={setFullCam}
        stack={selHood ? stackForHood(selHood.id) : []} onRequestPhoto={requestPhoto} />

      <FullscreenCam hood={fullCam} onMinimize={() => setFullCam(null)} onClose={() => { setFullCam(null); setSel(null); }}
        stack={fullCam ? stackForHood(fullCam.id) : []} onRequestPhoto={requestPhoto} />

      {/* hidden upload input + capture chooser + webcam */}
      <input ref={fileInputRef} type="file" accept="image/*" onChange={onFilePicked} style={{ display: "none" }} />
      <input ref={cameraInputRef} type="file" accept="image/*" capture="environment" onChange={onFilePicked} style={{ display: "none" }} />
      <CaptureChooser open={!!captureHood && !cameraOpen} hoodName={captureHood && captureHood.name}
        onClose={() => setCaptureHood(null)}
        onTakePhoto={takePhoto}
        onUpload={() => fileInputRef.current && fileInputRef.current.click()} />
      <CameraModal open={cameraOpen} hoodName={captureHood && captureHood.name}
        onClose={() => setCameraOpen(false)}
        onCapture={(file) => { if (captureHood) capturePhoto(captureHood, file); setCameraOpen(false); setCaptureHood(null); }} />

      {/* ── Tweaks ── */}
      <TweaksPanel>
        <TweakSection label="Look" />
        <TweakColor label="Palette" value={t.palette}
          options={[PALETTES.classic, PALETTES.foggy, PALETTES.sunset]}
          onChange={v => setTweak("palette", v)} />
        <TweakToggle label="Hand-drawn wobble" value={t.wobble} onChange={v => setTweak("wobble", v)} />
      </TweaksPanel>

      <SettingsPanel open={settingsOpen} onClose={() => setSettingsOpen(false)}
        account={acctView} onSave={saveAccount} onLogout={logout}
        contributions={contributions} onDelete={deleteContribution} />
    </div>
  );
}

// ── device shell: centers + scales the iPhone to fit the viewport ──
function Shell() {
  const wrapRef = useRef(null);
  const [scale, setScale] = useState(1);
  const [isDesktop, setIsDesktop] = useState(window.innerWidth >= 768);
  const DW = 390, DH = 844;
  useEffect(() => {
    const fit = () => {
      setIsDesktop(window.innerWidth >= 768);
      const pad = 24;
      const s = Math.min(1, (window.innerWidth - pad) / DW, (window.innerHeight - pad) / DH);
      setScale(s);
    };
    fit();
    window.addEventListener("resize", fit);
    return () => window.removeEventListener("resize", fit);
  }, []);
  if (isDesktop) return (
    <div style={{ position: "fixed", inset: 0 }}>
      <App isDesktop={true} />
    </div>
  );
  return (
    <div ref={wrapRef} style={{ position: "fixed", inset: 0, display: "flex", alignItems: "center",
      justifyContent: "center", background: "#d9d6d0",
      backgroundImage: "radial-gradient(circle at 50% 30%, #e4e1db, #cdc9c2)", overflow: "hidden" }}>
      <div style={{ width: DW, height: DH, transform: `scale(${scale})`, transformOrigin: "center center" }}>
        <IOSDevice width={DW} height={DH}>
          <App />
        </IOSDevice>
      </div>
    </div>
  );
}

const isNative = !!(window.__KC_NATIVE__ || window.ReactNativeWebView);
ReactDOM.createRoot(document.getElementById("root")).render(isNative ? <App /> : <Shell />);

  </script>

</body>
